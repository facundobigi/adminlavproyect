<html>
<head>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="adminlavproyect">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    overscroll-behavior: none;
  }

  flt-glass-pane {
    touch-action: none;
  }
</style>


  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>adminlavproyect</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      const reloadKey = 'adminlav-runtime-cache-cleared-v1';

      function loadFlutter() {
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js?v=' + Date.now();
        script.defer = true;
        document.body.appendChild(script);
      }

      async function clearStaleRuntime() {
        let cleared = false;

        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(function (registration) {
            cleared = true;
            return registration.unregister();
          }));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(function (key) {
            cleared = true;
            return caches.delete(key);
          }));
        }

        return cleared;
      }

      clearStaleRuntime()
        .then(function (cleared) {
          if (cleared && sessionStorage.getItem(reloadKey) !== 'done') {
            sessionStorage.setItem(reloadKey, 'done');
            window.location.reload();
            return;
          }
          sessionStorage.removeItem(reloadKey);
          loadFlutter();
        })
        .catch(function (error) {
          console.warn('Could not clear old app cache:', error);
          loadFlutter();
        });
    })();
  </script>
</body>
</html>
